<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WC 2026 Survivor Pool</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--green:#1a7a3f;--green-l:#e8f5ee;--green-m:#2ea05a;--gold:#c9973a;--gold-l:#fdf3e3;--red:#c0392b;--red-l:#fdecea;--blue:#1a5ca8;--blue-l:#e8f0fb;--bg:#f5f4f0;--card:#fff;--border:#e0ddd6;--text:#1a1a1a;--muted:#6b6860;--hint:#a09d97;--r:10px;--rl:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.hdr{background:var(--green);color:#fff;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hdr-logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700}
.hdr-logo span{color:var(--gold)}
.hdr-sub{font-size:11px;opacity:.7;margin-top:1px}
.hdr-btns{display:flex;gap:6px;flex-wrap:wrap}
.hdr-btn{padding:5px 13px;border:1.5px solid rgba(255,255,255,.45);border-radius:20px;background:transparent;color:#fff;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.hdr-btn:hover{background:rgba(255,255,255,.15)}

/* ENTRY BAR */
.ebar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ebar-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--hint);flex-shrink:0}
.add-btn{padding:6px 16px;border-radius:20px;border:none;background:var(--green);color:#fff;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.add-btn:hover{background:var(--green-m)}
.epill{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-family:'Barlow',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);position:relative}
.epill:hover{border-color:var(--green);color:var(--green)}
.epill.active{background:var(--green);border-color:var(--green);color:#fff}
.epill.elim{border-color:var(--red);color:var(--red);background:var(--red-l)}
.edel{position:absolute;top:-5px;right:-5px;width:15px;height:15px;border-radius:50%;background:#e74c3c;border:none;color:#fff;font-size:9px;cursor:pointer;display:none;align-items:center;justify-content:center;font-weight:700}
.epill:hover .edel{display:flex}

/* STATS BAR */
.sbar{background:var(--green);color:#fff;padding:8px 20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.sbar-item{display:flex;flex-direction:column;padding-right:20px;border-right:1px solid rgba(255,255,255,.2)}
.sbar-item:last-child{border-right:none}
.sbar-val{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;line-height:1}
.sbar-lbl{font-size:10px;opacity:.7;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.s-alive{color:#7eed9f}.s-elim{color:#f5a5a0}

/* STAGE NAV */
.snav{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;display:flex;overflow-x:auto}
.snav-btn{padding:11px 16px;border:none;border-bottom:3px solid transparent;background:transparent;font-family:'Barlow',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:5px}
.snav-btn:hover{color:var(--green)}
.snav-btn.active{color:var(--green);border-bottom-color:var(--green);font-weight:600}
.snav-dot{width:6px;height:6px;border-radius:50%;background:var(--green-m);display:none}
.snav-btn.done .snav-dot{display:inline-block}

/* MAIN */
.main{padding:20px}
.main-inner{max-width:1200px;margin:0 auto}

/* WELCOME */
.welcome{text-align:center;padding:60px 20px}
.welcome-icon{font-size:48px;margin-bottom:12px}
.welcome-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:var(--muted);margin-bottom:8px}
.welcome-sub{font-size:14px;color:var(--hint);margin-bottom:24px}

/* OVERVIEW CARDS */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.ov-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:14px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.ov-card:hover{border-color:var(--green);box-shadow:0 2px 8px rgba(26,122,63,.12)}
.ov-card.elim{opacity:.65;border-color:var(--red)}
.ov-card-add{border:1.5px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:130px;color:var(--hint)}
.ov-card-add:hover{border-color:var(--green);color:var(--green)}
.ov-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.ov-surv{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:var(--green)}
.ov-surv.low{color:var(--red)}
.ov-lbl{font-size:11px;color:var(--hint);text-transform:uppercase;letter-spacing:.05em}
.ov-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px}
.ochip{font-size:10px;padding:2px 6px;border-radius:8px;border:1px solid var(--border);color:var(--muted);background:var(--bg)}
.ochip.won{background:var(--green-l);color:var(--green);border-color:#b5dbc5}
.ochip.lost{background:var(--red-l);color:var(--red);border-color:#f5c0bb;text-decoration:line-through}
.spill{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
.spill-a{background:var(--green-l);color:var(--green)}
.spill-e{background:var(--red-l);color:var(--red)}

/* KO STAGE */
.kh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.kh h2{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700}
.khint{font-size:13px;color:var(--muted)}
.my-pick-bar{background:var(--blue-l);border:1px solid #c5d9f5;border-radius:var(--r);padding:5px 12px;font-size:12px;color:var(--blue);font-weight:500;margin-bottom:8px}
.pctr{background:var(--green-l);color:var(--green);border-radius:20px;padding:4px 14px;font-size:13px;font-weight:600;border:1px solid #b5dbc5}
.pctr.full{background:var(--gold-l);color:var(--gold);border-color:#f0d595}
.matches{display:flex;flex-direction:column;gap:5px}

/* COMPACT KO ROW */
.mc-row{display:flex;align-items:center;gap:0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;font-size:13px}
.mc-row.haspick{border-color:#c5d9f5}
.mtr-c{display:flex;align-items:center;gap:6px;padding:7px 10px;cursor:pointer;flex:1;min-width:0;transition:background .1s}
.mtr-c:first-child{justify-content:flex-start}
.mtr-c:last-child{justify-content:flex-end}
.mtr-c:hover{background:var(--bg)}
.mtr-c.mpick{background:var(--blue-l)}
.mtr-c.mpick .mname-c{color:var(--blue);font-weight:700}
.mtr-c.mwon{background:var(--green-l)}
.mtr-c.mwon .mname-c{color:var(--green);font-weight:700}
.mtr-c.mlost{background:var(--red-l);opacity:.5}
.mtr-c.mloser{opacity:.35}
.mtr-c.mused{opacity:.2;pointer-events:none}
.mflag-c{font-size:15px;flex-shrink:0}
.mname-c{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mprob-c{font-size:11px;color:var(--hint);flex-shrink:0;min-width:32px}
.mtr-c:last-child .mprob-c{text-align:right}
.mbadge-c{font-size:11px;font-weight:700;flex-shrink:0;width:14px;text-align:center}
.mbadge-c.mb-p{color:var(--blue)}
.mbadge-c.mb-w{color:var(--green)}
.mbadge-c.mb-l{color:var(--red)}
.mresult-c{font-family:'Barlow',sans-serif;font-size:11px;border:1px solid var(--border);border-radius:0;background:#fafaf8;color:var(--muted);padding:7px 6px;cursor:pointer;flex-shrink:0;max-width:110px}

/* CHAMP */
.champ-box{background:var(--gold-l);border:2px solid var(--gold);border-radius:var(--rl);padding:32px;text-align:center;max-width:420px;margin:0 auto 20px}
.champ-icon{font-size:44px}
.champ-name{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:700;color:var(--gold);margin:6px 0 4px}
.champ-sub{font-size:13px;color:var(--muted)}

/* SUMMARY TABLE */
.sum-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--rl);background:var(--card)}
.sum-tbl{border-collapse:collapse;width:100%;min-width:760px}
.sum-tbl th{padding:9px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);background:#f7f6f2;border-bottom:1px solid var(--border);white-space:nowrap;text-align:left}
.sum-tbl td{padding:8px 14px;border-bottom:1px solid #f0ede7;vertical-align:middle}
.sum-tbl tr:last-child td{border-bottom:none}
.sum-tbl tr:hover td{background:#fafaf8}
.sum-tbl tr.r-alive td:first-child{border-left:3px solid var(--green-m)}
.sum-tbl tr.r-elim td:first-child{border-left:3px solid var(--red)}
.sum-tbl tr.r-elim td{background:#fffafa}
.pname{font-size:13px;font-weight:600}
.usednum{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--muted)}
.survnum{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700}
.survnum.hi{color:var(--green)}.survnum.mi{color:var(--gold)}.survnum.lo{color:var(--red)}
.pcell{display:flex;flex-wrap:wrap;gap:4px}
.ptag{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:#f5f4f0;color:var(--muted);white-space:nowrap;cursor:pointer}
.ptag:hover{background:#ede9e0}
.ptag.pend{background:#f0f0f0;color:var(--muted)}
.ptag.actv{background:var(--blue-l);color:var(--blue);border-color:#b5cff5}
.ptag.corr{background:var(--green-l);color:var(--green);border-color:#b5dbc5}
.ptag.wrng{background:var(--red-l);color:var(--red);border-color:#f5c0bb;text-decoration:line-through}
.ndash{color:var(--border);font-size:16px}

/* PROBS */
.kps{margin-top:18px}
.kps h3{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.kpr{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;flex-wrap:wrap}
.kpn{font-size:13px;flex:1;min-width:90px}
.kpi{width:50px;text-align:right;font-family:'Barlow',sans-serif;font-size:13px;border:1px solid var(--border);border-radius:6px;padding:3px 5px}
.kvs{font-size:11px;color:var(--hint)}
.prs{font-size:11px;border:1px solid var(--border);border-radius:6px;background:#fff;padding:3px 5px;color:var(--text)}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--rl);padding:24px;width:300px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal h3{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin-bottom:12px}
.modal input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);font-family:'Barlow',sans-serif;font-size:14px;margin-bottom:12px;outline:none}
.modal input:focus{border-color:var(--green)}
.mbtns{display:flex;gap:8px;justify-content:flex-end}
.mbtn-s{padding:8px 18px;border:none;border-radius:var(--r);background:var(--green);color:#fff;font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;cursor:pointer}
.mbtn-c{padding:8px 14px;border:1px solid var(--border);border-radius:var(--r);background:transparent;font-family:'Barlow',sans-serif;font-size:14px;cursor:pointer;color:var(--muted)}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--text);color:#fff;padding:9px 16px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:300;opacity:0;transform:translateY(6px);transition:all .22s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

.info-box{font-size:13px;color:var(--muted);padding:8px 14px;background:var(--gold-l);border:1px solid #f0d595;border-radius:var(--r);margin-bottom:12px}

/* COLLISION MATRIX */
.mx-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.mx-tbl{border-collapse:collapse;font-size:12px;white-space:nowrap}
.mx-tbl th,.mx-tbl td{width:64px;height:56px;text-align:center;vertical-align:middle;border:1px solid rgba(255,255,255,.08);position:relative;font-weight:700;font-size:11px}
.mx-tbl th{background:#2a2a2a;color:#ccc;font-size:12px;width:56px;height:56px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.04em}
.mx-tbl th.highlight{background:#1a5c30;color:#7eed9f}
.mx-same{background:#3a3a3a;color:#888}
.mx-legend{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:14px;font-size:12px}
.mx-leg-item{display:flex;align-items:center;gap:6px}
.mx-leg-dot{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.mx-section-hdr{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px}

/* NO ENTRY */
.no-entry-msg{text-align:center;padding:60px 20px;color:var(--hint)}

@media(max-width:600px){
  .hdr{padding:0 14px}
  .ebar{padding:8px 14px}
  .main{padding:14px}
  .sbar-item{padding:0 12px 0 0;margin-right:12px}
  .sbar-val{font-size:20px}
}
</style>
</head>
<body>

<header class="hdr">
  <div>
    <div class="hdr-logo">WC 2026 <span>Survivor</span></div>
    <div class="hdr-sub">Pool tracker · auto-saves in browser · probs via FiveThirtyEight/Opta</div>
  </div>
  <div class="hdr-btns">
    <button class="hdr-btn" onclick="go('overview')">All Entries</button>
    <button class="hdr-btn" onclick="go('summary')">📊 Pool Summary</button>
    <button class="hdr-btn" onclick="go('quadrants')">🧭 Quadrants</button>
    <button class="hdr-btn" onclick="go('path')">🎯 Path Planner</button>
    <button class="hdr-btn" onclick="go('combos')">🔀 All Combos</button>
    <button class="hdr-btn" onclick="go('matrix')">🗺 Path Matrix</button>
    <button class="hdr-btn" onclick="go('probs')">Edit Probabilities</button>
  </div>
</header>

<div class="ebar">
  <span class="ebar-lbl">Entry:</span>
  <div id="epills" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
    <button class="add-btn" onclick="addEntry()">+ Add Entry</button>
  </div>
</div>

<div id="sbar" style="display:none"></div>
<nav id="snav" style="display:none"></nav>
<main class="main" id="main"></main>

<div class="overlay" id="modal">
  <div class="modal">
    <h3 id="mtitle">Add Entry</h3>
    <input id="minput" type="text" placeholder="e.g. Drew Entry 1"/>
    <div class="mbtns">
      <button class="mbtn-c" onclick="closeModal()">Cancel</button>
      <button class="mbtn-s" onclick="confirmModal()">Save</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── DATA ──
const R32_PICKS = 2;
const KO_NAMES = ['Round of 32','Round of 16','Quarterfinals','Semifinals','Final'];

// 32 teams, win probabilities via Opta/538 blended model.
// p = win probability for this specific Round of 32 match (set per-match below in KO_DEF instead).
// This TEAMS object just holds flag + later-round probabilities (qf/sf/fin/ch) for reference & sorting.
const TEAM_INFO = {
  'Germany': {f:'🇩🇪', qf:32, sf:19, fin:8, ch:4},
  'Paraguay': {f:'🇵🇾', qf:19.56, sf:8.21, fin:2.18, ch:0.8},
  'France': {f:'🇫🇷', qf:100, sf:100, fin:53.7, ch:28.6},
  'Sweden': {f:'🇸🇪', qf:7.66, sf:3.42, fin:1.11, ch:0.44},
  'South Africa': {f:'🇿🇦', qf:0.0, sf:0.0, fin:0.0, ch:0.0},
  'Canada': {f:'🇨🇦', qf:39.28, sf:9.64, fin:2.35, ch:0.92},
  'Netherlands': {f:'🇳🇱', qf:27, sf:13, fin:6, ch:3},
  'Morocco': {f:'🇲🇦', qf:100, sf:19.6, fin:5.8, ch:1.6},
  'Portugal': {f:'🇵🇹', qf:30.46, sf:19.96, fin:9.98, ch:5.49},
  'Croatia': {f:'🇭🇷', qf:9.71, sf:4.63, fin:1.9, ch:0.8},
  'Spain': {f:'🇪🇸', qf:100, sf:100, fin:46.3, ch:23.2},
  'Austria': {f:'🇦🇹', qf:5.53, sf:2.24, fin:0.83, ch:0.33},
  'United States': {f:'🇺🇸', qf:35.99, sf:11.79, fin:4.4, ch:1.67},
  'Bosnia': {f:'🇧🇦', qf:7.67, sf:1.43, fin:0.49, ch:0.31},
  'Belgium': {f:'🇧🇪', qf:100, sf:20.8, fin:6.2, ch:2.0},
  'Senegal': {f:'🇸🇳', qf:21.04, sf:6.42, fin:2.45, ch:0.83},
  'Brazil': {f:'🇧🇷', qf:65.37, sf:36.73, fin:20.48, ch:9.64},

  'Ecuador': {f:'🇪🇨', qf:12.18, sf:4.14, fin:1.29, ch:0.49},
  'England': {f:'🏴󠁧󠁢󠁥󠁮󠁧󠁿', qf:100, sf:100, fin:42.1, ch:18.8},
  'D.R. Congo': {f:'🇨🇩', qf:5.2, sf:1.13, fin:0.43, ch:0.27},
  'Argentina': {f:'🇦🇷', qf:100, sf:100, fin:57.9, ch:29.5},
  'Cape Verde': {f:'🇨🇻', qf:3.92, sf:1.23, fin:0.39, ch:0.27},
  'Australia': {f:'🇦🇺', qf:9.65, sf:3.64, fin:1.02, ch:0.36},
  'Egypt': {f:'🇪🇬', qf:12.63, sf:4.89, fin:1.33, ch:0.49},
  'Switzerland': {f:'🇨🇭', qf:100, sf:21.8, fin:7.2, ch:2.1},
  'Algeria': {f:'🇩🇿', qf:16.15, sf:4.3, fin:0.93, ch:0.37},
  'Colombia': {f:'🇨🇴', qf:43.89, sf:18.65, fin:8.07, ch:2.59},
  'Ghana': {f:'🇬🇭', qf:11.12, sf:2.91, fin:0.89, ch:0.34},
};

// ── ROUND OF 32 BRACKET ──
// Real 2026 World Cup bracket. Quadrant order: Q1 (France side) -> Q2 (USA side) -> Q3 (Mexico side) -> Q4 (Colombia side)
const KO_DEF = [
  {name:'Round of 32',matches:[
    // Q1 — France's quadrant
    {h:{f:'🇩🇪',n:'Germany'},a:{f:'🇵🇾',n:'Paraguay'},hp:22,ap:78,result:'Paraguay',city:'Boston',date:'Jun 29'},
    {h:{f:'🇫🇷',n:'France'},a:{f:'🇸🇪',n:'Sweden'},hp:86,ap:14,result:'France',city:'New York',date:'Jun 30'},
    {h:{f:'🇿🇦',n:'South Africa'},a:{f:'🇨🇦',n:'Canada'},hp:0,ap:100,result:'Canada',city:'Los Angeles',date:'Jun 28'},
    {h:{f:'🇳🇱',n:'Netherlands'},a:{f:'🇲🇦',n:'Morocco'},hp:0,ap:100,result:'Morocco',city:'Monterrey',date:'Jun 29'},
    // Q2 — USA's quadrant
    {h:{f:'🇵🇹',n:'Portugal'},a:{f:'🇭🇷',n:'Croatia'},hp:72,ap:28,result:'Portugal',city:'Toronto',date:'Jul 2'},

// ── HEAD-TO-HEAD CONDITIONAL WIN ODDS ──
// Real conditional win probabilities from Silver Bulletin ("cond win %" if the match occurs).
// Key: 'TeamA|TeamB' => TeamA win %. Only one direction stored; code checks both orders.
const MATCHUP_ODDS = {
  // Quarterfinals
  'France|Morocco': 80,
  'Spain|Belgium': 79,
  'England|Norway': 63,
  'Argentina|Switzerland': 78,
  // Semifinals -- actual real-world matchups (France v Spain, Argentina v England)
  'Argentina|England': 58,
  'France|Spain': 54,
  // Final -- all 4 possible pairings, real conditional win % from Silver Bulletin
  'Argentina|France': 50,
  'Argentina|Spain': 53,
  'France|England': 57,
  'Spain|England': 54,
};
function getMatchupWinPct(teamA, teamB) {
  // Returns teamA's win % vs teamB using real odds if available, else TEAM_INFO champ-ratio.
  if (MATCHUP_ODDS[teamA+'|'+teamB] !== undefined && MATCHUP_ODDS[teamA+'|'+teamB] < 200) {
    return MATCHUP_ODDS[teamA+'|'+teamB];
  }
  if (MATCHUP_ODDS[teamB+'|'+teamA] !== undefined && MATCHUP_ODDS[teamB+'|'+teamA] < 200) {
    return 100 - MATCHUP_ODDS[teamB+'|'+teamA];
  }
  // Fallback: ratio of championship odds (strength proxy)
  var a = TEAM_INFO[teamA], b = TEAM_INFO[teamB];
  if (a && b) {
    var as = a.ch || 1, bs = b.ch || 1;
    return Math.round(as / (as + bs) * 100);
  }
  return 50;
}

// ── BRACKET FEED ──
// Maps [ri, mi] -> { nextRi, nextMi, slot:'h'|'a' }
// Winner of match [ri][mi] becomes the home or away team in [nextRi][nextMi]
const BRACKET_FEED = {
  '0-0':  {ri:1, mi:0, slot:'h'},  // R32 m0 winner -> R16 m0 home
  '0-1':  {ri:1, mi:0, slot:'a'},  // R32 m1 winner -> R16 m0 away
  '0-2':  {ri:1, mi:1, slot:'h'},  // R32 m2 winner -> R16 m1 home
  '0-3':  {ri:1, mi:1, slot:'a'},  // R32 m3 winner -> R16 m1 away
  '0-4':  {ri:1, mi:2, slot:'h'},  // R32 m4 winner -> R16 m2 home
  '0-5':  {ri:1, mi:2, slot:'a'},  // R32 m5 winner -> R16 m2 away
  '0-6':  {ri:1, mi:3, slot:'h'},  // R32 m6 winner -> R16 m3 home
  '0-7':  {ri:1, mi:3, slot:'a'},  // R32 m7 winner -> R16 m3 away
  '0-8':  {ri:1, mi:4, slot:'h'},  // R32 m8 winner -> R16 m4 home
  '0-9':  {ri:1, mi:4, slot:'a'},  // R32 m9 winner -> R16 m4 away
  '0-10': {ri:1, mi:5, slot:'h'},  // R32 m10 winner -> R16 m5 home
  '0-11': {ri:1, mi:5, slot:'a'},  // R32 m11 winner -> R16 m5 away
  '0-12': {ri:1, mi:6, slot:'h'},  // R32 m12 winner -> R16 m6 home
  '0-13': {ri:1, mi:6, slot:'a'},  // R32 m13 winner -> R16 m6 away
  '0-14': {ri:1, mi:7, slot:'h'},  // R32 m14 winner -> R16 m7 home
  '0-15': {ri:1, mi:7, slot:'a'},  // R32 m15 winner -> R16 m7 away
  '1-0':  {ri:2, mi:0, slot:'h'},  '1-1':  {ri:2, mi:0, slot:'a'},
  '1-2':  {ri:2, mi:1, slot:'h'},  '1-3':  {ri:2, mi:1, slot:'a'},
  '1-4':  {ri:2, mi:2, slot:'h'},  '1-5':  {ri:2, mi:2, slot:'a'},
  '1-6':  {ri:2, mi:3, slot:'h'},  '1-7':  {ri:2, mi:3, slot:'a'},
  '2-0':  {ri:3, mi:0, slot:'h'},  '2-1':  {ri:3, mi:0, slot:'a'},
  '2-2':  {ri:3, mi:1, slot:'h'},  '2-3':  {ri:3, mi:1, slot:'a'},
  '3-0':  {ri:4, mi:0, slot:'h'},  '3-1':  {ri:4, mi:0, slot:'a'},
};

// Reverse lookup: given a target [ri,mi,slot], find which earlier [ri,mi] match feeds it.
const INVERSE_FEED = {};
Object.keys(BRACKET_FEED).forEach(function(key) {
  var feed = BRACKET_FEED[key];
  var srcParts = key.split('-');
  var srcRi = parseInt(srcParts[0]), srcMi = parseInt(srcParts[1]);
  INVERSE_FEED[feed.ri+'-'+feed.mi+'-'+feed.slot] = { ri:srcRi, mi:srcMi };
});

// Since the Quarterfinal bracket is fully locked (8 real teams in 4 fixed matches),
// the STRUCTURE of who could face whom in the SF and Final is entirely deterministic --
// only the WINNERS are uncertain. So for any of the 8 remaining teams we can precompute
// their fixed forward path: which SF match/slot they'd occupy if they win their QF, and
// which Final slot they'd occupy if they also win that SF. This lets us project an
// entry's own future-round picks forward without needing to independently resolve both
// sides of every intermediate match first.
function getTeamForwardPath(teamName) {
  for (var mi = 0; mi < koRounds[2].matches.length; mi++) {
    var m = koRounds[2].matches[mi];
    if (m.h.n === teamName || m.a.n === teamName) {
      var qfSlot = m.h.n === teamName ? 'h' : 'a';
      var sfFeed = BRACKET_FEED['2-' + mi]; // where this QF match's winner goes
      var finalFeed = sfFeed ? BRACKET_FEED[sfFeed.ri + '-' + sfFeed.mi] : null; // where that SF match's winner goes
      return { qf:{ri:2,mi:mi,slot:qfSlot}, sf:sfFeed, final:finalFeed };
    }
  }
  return null; // team not found among current QF participants (shouldn't happen for valid picks)
}

// Projects which team should appear in a given [ri,mi,slot] for a SPECIFIC entry's
// own pick chain, when the official/shared bracket doesn't have a real result there yet.
// This never mutates the shared koRounds data -- it's purely for personalizing what an
// entry sees on their own future-round pages, e.g. showing "Spain" in the Final slot
// once that entry has picked Spain to win the Semifinal, even though the real-world
// Semifinal hasn't been played and the official Final match is still TBD for everyone else.
// Given an unresolved [ri, mi, slot], recursively walks back through the bracket
// to enumerate every team that could still possibly end up there. E.g. for the
// Final's still-undecided side, this returns all 4 teams from the other half of the
// bracket (Norway, England, Argentina, Switzerland), since any of them could win
// their way there -- not just whichever one an entry happens to have already picked.
function getPossibleTeamsForSlot(ri, mi, slot) {
  var m = koRounds[ri].matches[mi];
  var direct = slot === 'h' ? m.h : m.a;
  if (direct.n !== 'TBD') return [direct]; // already resolved -- only one possible team

  var source = INVERSE_FEED[ri+'-'+mi+'-'+slot];
  if (!source) return [direct];

  var fromH = getPossibleTeamsForSlot(source.ri, source.mi, 'h');
  var fromA = getPossibleTeamsForSlot(source.ri, source.mi, 'a');
  return fromH.concat(fromA);
}

function projectTeamForEntry(ri, mi, slot, entry) {
  var m = koRounds[ri].matches[mi];
  var direct = slot === 'h' ? m.h : m.a;
  if (direct.n !== 'TBD') return direct; // official result already resolved this slot

  var qfPick = (entry.koPicks||[])[2];
  var sfPick = (entry.koPicks||[])[3];

  // A team's OWN pick for a round is, on its own, enough evidence to place them in
  // their natural bracket slot for THAT round's own display -- the entry doesn't
  // also need an earlier round's pick to "justify" it. E.g. picking Spain for the
  // Semifinal should show Spain sitting in the SF match list immediately, even with
  // no Quarterfinal pick on file.
  if (ri === 3 && sfPick) {
    var ownSfPath = getTeamForwardPath(sfPick);
    if (ownSfPath && ownSfPath.sf && ownSfPath.sf.ri === ri && ownSfPath.sf.mi === mi && ownSfPath.sf.slot === slot) {
      return { f:getTeamFlag(sfPick), n:sfPick };
    }
  }

  // Project an earlier pick forward into a later round's slot.
  if (qfPick) {
    var qfPath = getTeamForwardPath(qfPick);
    if (qfPath) {
      if (ri === 3 && qfPath.sf && qfPath.sf.ri === ri && qfPath.sf.mi === mi && qfPath.sf.slot === slot) {
        return { f:getTeamFlag(qfPick), n:qfPick };
      }
      if (ri === 4 && qfPath.final && qfPath.final.ri === ri && qfPath.final.mi === mi && qfPath.final.slot === slot) {
        // Only valid if this entry ALSO picked the same team to win the SF (otherwise the
        // QF pick alone doesn't guarantee they reach the Final).
        if (sfPick === qfPick) return { f:getTeamFlag(qfPick), n:qfPick };
      }
    }
  }
  if (sfPick) {
    var sfPath = getTeamForwardPath(sfPick);
    if (sfPath && ri === 4 && sfPath.final && sfPath.final.ri === ri && sfPath.final.mi === mi && sfPath.final.slot === slot) {
      return { f:getTeamFlag(sfPick), n:sfPick };
    }
  }

  return { f:'❓', n:'TBD' };
}

// Builds a "projected" version of a match for a specific entry: real h/a where known,
// otherwise filled in using that entry's own pick chain. Also recomputes hp/ap using
// real head-to-head odds once both sides are known via projection.
function getProjectedMatch(ri, mi, entry) {
  var m = koRounds[ri].matches[mi];
  if (m.result) return m; // already officially decided, nothing to project
  var projH = m.h.n !== 'TBD' ? m.h : projectTeamForEntry(ri, mi, 'h', entry);
  var projA = m.a.n !== 'TBD' ? m.a : projectTeamForEntry(ri, mi, 'a', entry);
  var projHp = m.hp, projAp = m.ap;
  if (projH.n !== 'TBD' && projA.n !== 'TBD' && (projH.n !== m.h.n || projA.n !== m.a.n)) {
    projHp = getMatchupWinPct(projH.n, projA.n);
    projAp = 100 - projHp;
  }
  return { h:projH, a:projA, hp:projHp, ap:projAp, result:m.result, city:m.city, date:m.date, projected:(projH.n!==m.h.n || projA.n!==m.a.n) };
}

  Q2: ['Portugal','Croatia','Spain','Austria','United States','Bosnia','Belgium','Senegal'],

const QUAD_COLORS = { Q1:'#185FA5', Q2:'#1a7a3f', Q3:'#c9973a', Q4:'#9c4dcc' };

}

// ── STORAGE ──
function saveData() {
  try {
    var d = JSON.stringify({entries:entries,selEntry:selEntry,stage:stage,koRounds:koRounds});
    localStorage.setItem('wc26_r32_v1', d);
  } catch(e){}
}
function loadData() {
  try {
    // clear all older/incompatible storage keys
    localStorage.removeItem('wc2026survivor');
    localStorage.removeItem('wc2026survivor_v2');
    localStorage.removeItem('wc26_v3');
    var raw = localStorage.getItem('wc26_r32_v1');
    if (!raw) return;
    var d = JSON.parse(raw);
    if (Array.isArray(d.entries)) entries = d.entries;
    if (d.selEntry !== undefined) selEntry = d.selEntry;
    if (typeof d.stage === 'string') stage = d.stage;
    // Merge saved koRounds onto fresh KO_DEF rather than overwriting:
    // - Always take hp/ap/city/date from the current code (KO_DEF), since those are
    //   maintained by app updates and shouldn't be stuck on stale saved values.
    // - Only carry over a saved match.result if the current code-defined match has
    //   no hardcoded result (i.e. don't let an old saved "Pending" erase a result
    //   that was just hardcoded into KO_DEF, but DO preserve manually-set results
    //   the user entered for matches the code doesn't already know the outcome of).
    if (Array.isArray(d.koRounds)) {
      koRounds.forEach(function(rd, ri) {
        var savedRd = d.koRounds[ri];
        if (!savedRd || !Array.isArray(savedRd.matches)) return;
        rd.matches.forEach(function(m, mi) {
          var savedM = savedRd.matches[mi];
          if (!savedM) return;
          // If the fresh code already has a hardcoded result, keep it (don't let stale "Pending" win).
          // Otherwise, fall back to a saved result — but ONLY if that team actually appears
          // in the current (possibly-updated) matchup, so stale results for teams no longer
          // in this slot get discarded.
          if (!m.result && savedM.result && (m.h.n===savedM.result || m.a.n===savedM.result)) {
            m.result = savedM.result;
          }
        });
      });
    }
  } catch(e) {
    try { localStorage.removeItem('wc26_r32_v1'); } catch(e2){}
  }
}

function deleteEntry(i) {

  entries.splice(i, 1);
  if (entries.length === 0) { selEntry = null; stage = 'overview'; }
  else selEntry = Math.min(selEntry || 0, entries.length - 1);

function selectEntry(i) {
  selEntry = i;
  if (stage === 'overview' || stage === 'summary' || stage === 'quadrants' || stage === 'matrix' || stage === 'probs') stage = 'Round of 32';
  saveData(); render();
}
function go(s) { stage = s; render(); }

function getUsed(e) {
  var s = new Set();
  (e.koPicks || []).forEach(function(n, ri){
    if (ri === 0) { (n||[]).forEach(function(x){ s.add(x); }); }
    else if (n) { s.add(n); }
  });
  return s;
}

function calcSurv(e) {
  if (!e.alive) return 0;
  var p = 1;
  (e.koPicks || []).forEach(function(pick, ri) {
    var rd = koRounds[ri];
    if (!rd) return;
    var picksArr = ri === 0 ? (pick||[]) : (pick ? [pick] : []);
    picksArr.forEach(function(name) {
      rd.matches.forEach(function(m) {
        if ((m.h.n===name||m.a.n===name) && !m.result) {
          p *= (m.h.n===name ? m.hp : m.ap) / 100;
        }
      });
    });
  });
  return Math.round(p * 100);
}

function toggleKOPick(ri, teamName) {
  if (selEntry === null) return;
  var e = entries[selEntry];
  var used = getUsed(e);
  if (ri === 0) {
    if (!e.koPicks[0]) e.koPicks[0] = [];
    var arr = e.koPicks[0];
    var idx = arr.indexOf(teamName);
    if (idx >= 0) {
      arr.splice(idx, 1);
    } else {
      if (arr.length >= R32_PICKS) { toast('Already have ' + R32_PICKS + ' Round of 32 picks — remove one first'); return; }
      if (used.has(teamName)) { toast(teamName + ' already used in another round'); return; }
      arr.push(teamName);
      toast(teamName + ' picked for Round of 32 (' + arr.length + '/' + R32_PICKS + ')');
    }
  } else {
    if (e.koPicks[ri] === teamName) {
      e.koPicks[ri] = null;
    } else {
      if (used.has(teamName) && e.koPicks[ri] !== teamName) { toast(teamName + ' already used in another round'); return; }
      e.koPicks[ri] = teamName;
      toast(teamName + ' picked for ' + KO_NAMES[ri]);
    }
  }
  saveData(); render();
}

function setMatchResult(ri, mi, winner) {
  var m = koRounds[ri].matches[mi];
  m.result = winner || null;

  // Propagate winner into the next round's match slot
  if (winner) {
    var feedKey = ri + '-' + mi;
    var feed = BRACKET_FEED[feedKey];
    if (feed) {
      var nextM = koRounds[feed.ri].matches[feed.mi];
      var winnerTeam = winner === m.h.n ? m.h : m.a;
      // Only update if the slot isn't already set to a different (still-valid) team
      if (feed.slot === 'h') {
        nextM.h = { f: winnerTeam.f, n: winnerTeam.n };
      } else {
        nextM.a = { f: winnerTeam.f, n: winnerTeam.n };
      }
      // Update probabilities for the next match using real head-to-head odds
      if (nextM.h.n !== 'TBD' && nextM.a.n !== 'TBD') {
        nextM.hp = getMatchupWinPct(nextM.h.n, nextM.a.n);
        nextM.ap = 100 - nextM.hp;
      }
      // If the winner slot previously had a different team's result, clear the downstream result
      if (nextM.result) {
        nextM.result = null;
        // Also clear further downstream recursively
        var nextFeedKey = feed.ri + '-' + feed.mi;
        var nextFeed = BRACKET_FEED[nextFeedKey];
        if (nextFeed) {
          var nextNextM = koRounds[nextFeed.ri].matches[nextFeed.mi];
          nextNextM.result = null;
        }
      }
    }

    // Mark eliminated entries
    entries.forEach(function(e) {
      if (ri === 0) {
        var picksArr = e.koPicks[0] || [];
        picksArr.forEach(function(pick) {
          if ((m.h.n===pick||m.a.n===pick) && pick!==winner) e.alive = false;
        });
      } else {
        var pick = e.koPicks[ri];
        if (pick && (m.h.n===pick||m.a.n===pick) && pick!==winner) e.alive = false;
      }
    });
  } else {
    // Result cleared — reset the downstream slot back to a TBD placeholder
    var feedKey = ri + '-' + mi;
    var feed = BRACKET_FEED[feedKey];
    if (feed) {
      var nextM = koRounds[feed.ri].matches[feed.mi];
      if (feed.slot === 'h') {
        nextM.h = { f: '❓', n: 'TBD' };
      } else {
        nextM.a = { f: '❓', n: 'TBD' };
      }
      nextM.result = null;
    }
  }

  saveData(); render();
}

// ── RENDER ──
function render() {
  // Recompute the shared Monte Carlo simulation ONCE per render pass so every
  // part of the UI (header stat, entry cards, summary table, summary panel)
  // shows the exact same, correctly-compounded survival numbers.
  _simCache = entries.length > 0 ? simulatePool(15000) : null;
  // Also recompute the "true" adaptive-aware survival % for every entry -- this
  // assumes OPTIMAL play at any remaining un-picked round (rather than silently
  // ignoring rounds nobody has picked yet, which used to show a misleading 100%).
  _trueSurvCache = entries.length > 0 ? computeTrueSurvivalForAllEntries() : null;
  renderEpills();
  renderSbar();
  renderSnav();
  renderMain();
}

var _trueSurvCache = null; // {entryName: pct} -- best achievable survival assuming optimal future picks

// Computes, for every entry, the survival probability assuming they play OPTIMALLY
// at any round they haven't picked yet -- i.e. picking whichever available team gives
// them the best combined chance, and adaptively choosing correctly among any later
// options that only resolve themselves once an earlier round concludes. This replaces
// the naive approach of just skipping unpicked rounds entirely (which silently treated
// "haven't decided yet" as "nothing more required" and showed inflated survival %).
function computeTrueSurvivalForAllEntries() {
  var result = {};
  var batchEntries = [];
  var batchMeta = []; // {realIndex}

  entries.forEach(function(e, ei) {
    if (!e.alive) { result[ei] = 0; return; }
    var enumResult = enumerateEntryCombos(e);
    if (enumResult.remainingRounds.length === 0) {
      // Fully committed (or nothing left to decide) -- use the entry's own direct
      // simulated result, which already correctly requires their exact picks to hit.
      result[ei] = { mode:'direct' };
    } else if (enumResult.capped) {
      // Too many rounds open to enumerate precisely -- fall back to the raw
      // simulated number as a conservative approximation.
      result[ei] = { mode:'fallback' };
    } else if (enumResult.combos.length === 0) {
      result[ei] = { mode:'zero' };
    } else {
      var comboEntries = enumResult.combos.map(function(chain) {
        var hypo = JSON.parse(JSON.stringify(e));
        chain.forEach(function(c){ hypo.koPicks[c.ri] = c.team; });
        return hypo;
      });
      var startIdx = batchEntries.length;
      comboEntries.forEach(function(hypo){ batchEntries.push(hypo); });
      result[ei] = { mode:'grouped', chains:enumResult.combos, startIdx:startIdx, count:comboEntries.length };
    }
  });

  var groupedSurvPcts = [];
  if (batchEntries.length > 0) {
    var savedEntries = entries;
    entries = batchEntries;
    var sim = simulatePool(Math.max(6000, Math.round(90000 / batchEntries.length)));
    entries = savedEntries;
    groupedSurvPcts = sim.perEntry.map(function(p){ return p*100; });
  }

  var finalResult = {};
  entries.forEach(function(e, ei) {
    var r = result[ei];
    if (r === 0) { finalResult[ei] = 0; return; }
    if (r.mode === 'direct' || r.mode === 'fallback') {
      finalResult[ei] = _simCache && _simCache.perEntry[ei] !== undefined ? _simCache.perEntry[ei]*100 : 0;
      return;
    }
    if (r.mode === 'zero') { finalResult[ei] = 0; return; }
    // grouped: sum survival across the BEST "pick now" branch's downstream adaptive options
    var chains = r.chains.map(function(chain, ci) {
      return { chain:chain, survPct: groupedSurvPcts[r.startIdx+ci] };
    });
    var groups = {};
    chains.forEach(function(c) {
      var prefix = c.chain.slice(0,-1);
      var key = JSON.stringify(prefix.map(function(p){return p.team;}));
      if (!groups[key]) groups[key] = 0;
      groups[key] += c.survPct;
    });
    var best = 0;
    Object.keys(groups).forEach(function(k){ if (groups[k] > best) best = groups[k]; });
    finalResult[ei] = best;
  });
  return finalResult;
}

// Returns an entry's true survival probability (0-100), assuming optimal play for
// any remaining un-picked rounds (not just the specific picks made so far).
function getSurvPct(e) {
  if (!e.alive) return 0;
  var idx = entries.indexOf(e);
  if (_trueSurvCache && _trueSurvCache[idx] !== undefined) {
    return Math.round(_trueSurvCache[idx]);
  }
  if (_simCache && idx >= 0 && _simCache.perEntry[idx] !== undefined) {
    return Math.round(_simCache.perEntry[idx] * 100);
  }
  return calcSurv(e); // fallback for safety if cache isn't ready
}

function renderEpills() {
  var wrap = document.getElementById('epills');
  var h = '';
  entries.forEach(function(e, i) {
    var cls = 'epill' + (selEntry===i?' active':'') + (!e.alive?' elim':'');
    h += '<button class="'+cls+'" onclick="selectEntry('+i+')">' + esc(e.name) +
      '<span class="edel" onclick="event.stopPropagation();deleteEntry('+i+')">✕</span></button>';
  });
  h += '<button class="add-btn" onclick="addEntry()">+ Add Entry</button>';
  wrap.innerHTML = h;
}

function renderSbar() {
  var el = document.getElementById('sbar');
  if (selEntry === null || entries.length === 0) { el.style.display='none'; return; }
  el.className = 'sbar'; el.style.display = 'flex';
  var e = entries[selEntry];
  var surv = getSurvPct(e);
  var r32Count = (e.koPicks[0]||[]).length;
  var otherKpCount = (e.koPicks||[]).slice(1).filter(function(x){return x;}).length;
  var kp = r32Count + otherKpCount;
  el.innerHTML =
    '<div class="sbar-item"><div class="sbar-val">'+surv+'%</div><div class="sbar-lbl">Survival prob.</div></div>' +
    '<div class="sbar-item"><div class="sbar-val">'+r32Count+'/'+R32_PICKS+'</div><div class="sbar-lbl">Rd of 32 picks</div></div>' +
    '<div class="sbar-item"><div class="sbar-val">'+kp+'/6</div><div class="sbar-lbl">Total picks</div></div>' +
    '<div class="sbar-item"><div class="sbar-val '+(e.alive?'s-alive':'s-elim')+'">'+(e.alive?'Active':'Eliminated')+'</div><div class="sbar-lbl">Status</div></div>';
}

function renderSnav() {
  var el = document.getElementById('snav');
  if (selEntry === null) { el.style.display='none'; return; }
  el.className='snav'; el.style.display='flex';
  var e = entries[selEntry];
  el.innerHTML = KO_NAMES.map(function(s) {
    var active = stage===s ? ' active':'';
    var done = '';
    var ki = KO_NAMES.indexOf(s);
    if (ki===0 && (e.koPicks[0]||[]).length>=R32_PICKS) done=' done';
    else if (ki>0 && (e.koPicks||[])[ki]) done=' done';
    return '<button class="snav-btn'+active+done+'" onclick="go(\''+s+'\')"><span class="snav-dot"></span>'+s+'</button>';
  }).join('');
}

function renderMain() {
  var el = document.getElementById('main');
  try {
    if (stage==='overview')   { el.innerHTML = renderOverview();   return; }
    if (stage==='summary')    { el.innerHTML = renderSummary();    return; }
    if (stage==='quadrants')  { el.innerHTML = renderQuadrants();  return; }
    if (stage==='path')       { el.innerHTML = renderPathPlanner(); return; }
    if (stage==='combos')     { el.innerHTML = renderCombos();       return; }
    if (stage==='matrix')     { el.innerHTML = renderMatrix();     return; }
    if (stage==='probs')      { el.innerHTML = renderProbs();      return; }
    if (selEntry===null) {
      el.innerHTML = '<div class="welcome"><div class="welcome-icon">⚽</div><div class="welcome-title">Select or add an entry to begin</div><div class="welcome-sub">Use "+ Add Entry" in the bar above</div></div>';
      return;
    }
    var ri = KO_NAMES.indexOf(stage);
    if (ri>=0) { el.innerHTML = renderKOStage(ri); return; }
    el.innerHTML = '';
  } catch(err) {
    el.innerHTML = '<div class="welcome"><div class="welcome-icon">⚠️</div><div class="welcome-title">Something went wrong</div><div class="welcome-sub">'+err.message+'</div></div>';
    console.error(err);
  }
}

function renderOverview() {
  var h = '<div class="main-inner">';
  if (entries.length === 0) {
    h += '<div class="welcome"><div class="welcome-icon">⚽</div><div class="welcome-title">Welcome to WC 2026 Survivor</div><div class="welcome-sub">Click the card below to create your first entry</div></div>';
  }
  h += '<div class="ov-grid">';
  entries.forEach(function(e, i) {
    var surv = getSurvPct(e);
    var koFlat = [];
    (e.koPicks||[]).forEach(function(n, ri) {
      if (ri === 0) { (n||[]).forEach(function(name){ koFlat.push({n:name,ri:ri}); }); }
      else if (n) { koFlat.push({n:n,ri:ri}); }
    });
    var chips = koFlat.map(function(p) {
      var cls = 'ochip';
      var m = koRounds[p.ri] && koRounds[p.ri].matches.find(function(m){return m.h.n===p.n||m.a.n===p.n;});
      if (m && m.result===p.n) cls+=' won';
      if (m && m.result && m.result!==p.n) cls+=' lost';
      return '<span class="'+cls+'">'+esc(p.n)+'</span>';
    }).join('');
    h += '<div class="ov-card'+(e.alive?'':' elim')+'" onclick="selectEntry('+i+');go(\'Round of 32\')">' +
      '<div class="ov-name">'+esc(e.name)+' <span class="spill '+(e.alive?'spill-a':'spill-e')+'">'+(e.alive?'Active':'Out')+'</span></div>' +
      '<div class="ov-surv'+(surv<20?' low':'')+'">'+surv+'%</div>' +
      '<div class="ov-lbl">survival probability</div>' +
      '<div class="ov-chips">'+(chips||'<span style="font-size:11px;color:var(--hint)">No picks yet</span>')+'</div>' +
      '</div>';
  });
  h += '<div class="ov-card ov-card-add" onclick="addEntry()">' +
    '<div style="font-size:26px;margin-bottom:6px">+</div>' +
    '<div style="font-size:13px;font-weight:500">Add Entry</div></div>';
  h += '</div></div>';
  return h;
}

function otherEntriesPanel(ri, currentPicks) {
  var otherEntries = entries.filter(function(_,i){ return i !== selEntry; });
  if (otherEntries.length === 0) return '';
  var h = '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:12px">';
  h += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--hint);margin-bottom:8px">Other entries — '+KO_NAMES[ri]+' picks</div>';
  h += '<div style="display:flex;flex-direction:column;gap:6px">';
  var anyOverlap = false;
  otherEntries.forEach(function(oe) {
    var picksArr = ri===0 ? (oe.koPicks[0]||[]) : ((oe.koPicks||[])[ri] ? [(oe.koPicks||[])[ri]] : []);
    h += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
    h += '<span style="font-size:12px;font-weight:600;color:var(--muted);min-width:100px;flex-shrink:0">'+esc(oe.name)+'</span>';
    if (picksArr.length === 0) {
      h += '<span style="font-size:12px;color:var(--hint);font-style:italic">No pick yet</span>';
    } else {
      picksArr.forEach(function(name) {
        var alsoMine = currentPicks.indexOf(name) >= 0;
        if (alsoMine) anyOverlap = true;
        var flag = getTeamFlag(name);
        var q = getQuadrant(name);
        var bg = alsoMine ? '#fff3cd' : 'var(--bg)';
        var border = alsoMine ? '1px solid #f0c040' : '1px solid var(--border)';
        h += '<span style="display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:12px;background:'+bg+';border:'+border+';color:var(--text)">'
          + flag + ' ' + esc(name)
          + (q?'<span style="font-size:9px;font-weight:700;opacity:.55;margin-left:2px;background:rgba(0,0,0,.08);padding:1px 4px;border-radius:3px">'+q+'</span>':'')
          + '</span>';
      });
    }
    h += '</div>';
  });
  h += '</div>';
  if (anyOverlap && currentPicks.length > 0) {
    h += '<div style="margin-top:8px;font-size:11px;color:var(--gold);display:flex;align-items:center;gap:5px">'
      + '<span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:#fff3cd;border:1px solid #f0c040"></span>'
      + 'Yellow = also in your current picks</div>';
  }
  h += '</div>';
  return h;
}

function renderKOStage(ri) {
  if (selEntry===null) return '';
  var e = entries[selEntry];
  var used = getUsed(e);
  var rd = koRounds[ri];

  if (ri === 0) {
    var picks = e.koPicks[0] || [];
    var h = '<div class="kh"><h2>'+rd.name+'</h2><span class="khint">Pick '+R32_PICKS+' teams · each team usable once across all rounds</span></div>';
    var full = picks.length >= R32_PICKS;
    h += '<div class="pctr'+(full?' full':'')+'" style="display:inline-block;margin-bottom:10px">'+picks.length+' / '+R32_PICKS+' selected'+(full?' ✓':'')+'</div>';
    h += otherEntriesPanel(0, picks);
    if (picks.length > 0) {
      h += '<div class="my-pick-bar">✓ Your picks: <strong>'+picks.map(function(p){return esc(p);}).join(', ')+'</strong> &nbsp;·&nbsp; <span style="color:var(--muted);font-weight:400">Click a picked team again to deselect</span></div>';
    }
    h += '<div class="matches">';
    rd.matches.forEach(function(m, mi) {
      var hP = picks.indexOf(m.h.n) >= 0;
      var aP = picks.indexOf(m.a.n) >= 0;
      h += matchRow(m,mi,ri,hP,aP,used,picks);
    });
    h += '</div>';
    return h;
  }

  var pick = (e.koPicks||[])[ri];

  if (ri===4) {
    var m = getProjectedMatch(ri, 0, e);
    var champ = m.result || pick;
    var ct = champ ? (m.h.n===champ?m.h:(m.a.n===champ?m.a:null)) : null;
    var h = '';
    if (ct) h += '<div class="champ-box"><div class="champ-icon">🏆</div>' +
      '<div class="champ-name">'+ct.f+' '+esc(ct.n)+'</div>' +
      '<div class="champ-sub">'+(m.result?'World Champion':'Your pick to win it all')+'</div></div>';
    h += '<div class="kh"><h2>The Final</h2></div>';
    h += '<div style="max-width:640px;margin:0 auto 8px;background:var(--blue-l);border:1px solid #b5cff5;border-radius:var(--r);padding:6px 12px;font-size:11px;color:var(--blue);font-weight:500">Not sure who\'s reaching the Final yet? Click "choose:" on either side to pick who you think will get there — you can lock in your Final winner now, before the Semifinals are even played.</div>';
    h += '<div style="max-width:640px;margin:0 auto">' + otherEntriesPanel(ri, pick ? [pick] : []) + '</div>';
    h += '<div style="max-width:640px;margin:0 auto">'+renderFutureMatchRow(ri,0,e,pick,used)+'</div>';
    return h;
  }

  var h = '<div class="kh"><h2>'+rd.name+'</h2><span class="khint">Click a team to pick · each team usable once</span></div>';
  h += otherEntriesPanel(ri, pick ? [pick] : []);
  if (pick) h += '<div class="my-pick-bar">✓ Your pick this round: <strong>'+esc(pick)+'</strong> &nbsp;·&nbsp; <span style="color:var(--muted);font-weight:400">Click again to deselect</span></div>';
  h += '<div class="matches">';
  if (ri === 3) {
    rd.matches.forEach(function(m0, mi) {
      h += renderFutureMatchRow(ri, mi, e, pick, used);
    });
  } else {
    rd.matches.forEach(function(m, mi) {
      var hP=pick===m.h.n, aP=pick===m.a.n;
      h += matchRow(m,mi,ri,hP,aP,used,pick);
    });
  }
  h += '</div>';
  return h;
}

// Renders a SF/Final match row that gracefully handles unresolved sides by showing
// every team that could possibly land there as clickable options, instead of a dead
// "TBD" the user can't interact with. This is what lets someone pick, say, "Argentina"
// as their assumed Final opponent before the real Semifinal has even been played.
function renderFutureMatchRow(ri, mi, entry, pick, used) {
  var proj = getProjectedMatch(ri, mi, entry);
  var resolvedH = proj.h.n !== 'TBD';
  var resolvedA = proj.a.n !== 'TBD';

  function renderSide(resolved, team, slot, align) {
    if (resolved) {
      var isPicked = pick === team.n;
      var isUsedElsewhere = used.has(team.n) && !isPicked;
      var cls = 'mtr-c' + (isUsedElsewhere ? ' mused' : '') + (isPicked && !proj.result ? ' mpick' : '');
      if (proj.result) {
        if (proj.result === team.n) cls += (isPicked ? ' mwon' : ' mloser');
        else cls += (isPicked ? ' mlost' : ' mloser');
      }
      var badge = isPicked ? '<span class="mbadge-c '+(proj.result?(proj.result===team.n?'mb-w':'mb-l'):'mb-p')+'">'+(proj.result?(proj.result===team.n?'✓':'✗'):'★')+'</span>' : '';
      var probVal = proj.result ? (proj.result===team.n?'100':'0') : (resolvedH&&resolvedA ? (slot==='h'?proj.hp:proj.ap) : '');
      var clickable = !isUsedElsewhere;
      var inner = (slot==='h')
        ? (badge+'<span class="mflag-c">'+team.f+'</span><span class="mname-c">'+esc(team.n)+'</span>'+(probVal!==''?'<span class="mprob-c">'+probVal+'%</span>':''))
        : ((probVal!==''?'<span class="mprob-c">'+probVal+'%</span>':'')+'<span class="mname-c">'+esc(team.n)+'</span><span class="mflag-c">'+team.f+'</span>'+badge);
      return '<div class="'+cls+'" style="flex:1;justify-content:'+(align)+'" onclick="'+(clickable?'toggleKOPick('+ri+',\''+esc2(team.n)+'\')':'')+'">'+inner+'</div>';
    } else {
      // Unresolved -- show every possible team as small inline clickable chips.
      var options = getPossibleTeamsForSlot(ri, mi, slot).filter(function(t){ return t.n !== 'TBD'; });
      var chipsHtml = options.map(function(t) {
        var isPicked = pick === t.n;
        var isUsedElsewhere = used.has(t.n) && !isPicked;
        var champPct = (TEAM_INFO[t.n] && TEAM_INFO[t.n].ch) || 0;
        var bg = isPicked ? 'var(--blue)' : 'var(--card)';
        var col = isPicked ? '#fff' : (isUsedElsewhere ? 'var(--hint)' : 'var(--text)');
        var border = isPicked ? 'var(--blue)' : 'var(--border)';
        return '<span onclick="'+(isUsedElsewhere?'':'toggleKOPick('+ri+',\''+esc2(t.n)+'\')')+'" style="display:inline-flex;align-items:center;gap:4px;background:'+bg+';color:'+col+';border:1px solid '+border+';border-radius:14px;padding:3px 9px;font-size:11px;font-weight:600;cursor:'+(isUsedElsewhere?'default':'pointer')+';opacity:'+(isUsedElsewhere?'.4':'1')+';margin:2px">'+t.f+' '+esc(t.n)+'<span style="opacity:.7;font-weight:400">&nbsp;'+champPct+'%</span></span>';
      }).join('');
      return '<div style="flex:1;padding:6px 10px;display:flex;flex-wrap:wrap;align-items:center;gap:4px;'+(slot==='a'?'justify-content:flex-end':'')+'"><span style="font-size:10px;color:var(--hint);margin-right:2px">choose:</span>'+chipsHtml+'</div>';
    }
  }

  var opts='<option value="">Pending</option>';
  if (resolvedH) opts += '<option value="'+esc2(proj.h.n)+'"'+(proj.result===proj.h.n?' selected':'')+'>'+esc(proj.h.f)+' '+esc(proj.h.n)+'</option>';
  if (resolvedA) opts += '<option value="'+esc2(proj.a.n)+'"'+(proj.result===proj.a.n?' selected':'')+'>'+esc(proj.a.f)+' '+esc(proj.a.n)+'</option>';
  var resultSelect = '<select class="mresult-c" onchange="setMatchResult('+ri+','+mi+',this.value)"'+((!resolvedH||!resolvedA)?' disabled':'')+'>'+opts+'</select>';

  return '<div class="mc-row">' +
    renderSide(resolvedH, proj.h, 'h', 'flex-start') +
    resultSelect +
    renderSide(resolvedA, proj.a, 'a', 'flex-end') +
  '</div>';
}

function matchRow(m, mi, ri, hP, aP, used, pick) {
  var hUsed = used.has(m.h.n) && !hP;
  var aUsed = used.has(m.a.n) && !aP;
  var hTbd = m.h.n === 'TBD';
  var aTbd = m.a.n === 'TBD';
  var hCls='mtr-c', aCls='mtr-c';
  if (m.result) {
    if (m.result===m.h.n) { hCls+=(hP?' mwon':' mloser'); aCls+=(aP?' mlost':' mloser'); }
    else { aCls+=(aP?' mwon':' mloser'); hCls+=(hP?' mlost':' mloser'); }
  } else {
    if (hP) hCls+=' mpick';
    if (aP) aCls+=' mpick';
  }
  if (hUsed || hTbd) hCls+=' mused';
  if (aUsed || aTbd) aCls+=' mused';
  var hBadge='', aBadge='';
  if (hP) hBadge='<span class="mbadge-c '+(m.result?(m.result===m.h.n?'mb-w':'mb-l'):'mb-p')+'">'+(m.result?(m.result===m.h.n?'✓':'✗'):'★')+'</span>';
  if (aP) aBadge='<span class="mbadge-c '+(m.result?(m.result===m.a.n?'mb-w':'mb-l'):'mb-p')+'">'+(m.result?(m.result===m.a.n?'✓':'✗'):'★')+'</span>';
  var opts='<option value="">Pending</option>';
  if (!hTbd) opts += '<option value="'+esc2(m.h.n)+'"'+(m.result===m.h.n?' selected':'')+'>'+esc(m.h.f)+' '+esc(m.h.n)+'</option>';
  if (!aTbd) opts += '<option value="'+esc2(m.a.n)+'"'+(m.result===m.a.n?' selected':'')+'>'+esc(m.a.f)+' '+esc(m.a.n)+'</option>';
  var hpDisplay = m.result ? (m.result===m.h.n ? '100' : '0') : (hTbd||aTbd ? '?' : m.hp);
  var apDisplay = m.result ? (m.result===m.a.n ? '100' : '0') : (hTbd||aTbd ? '?' : m.ap);
  var hClickable = !hUsed && !hTbd;
  var aClickable = !aUsed && !aTbd;
  return '<div class="mc-row">' +
    '<div class="'+hCls+'" onclick="'+(hClickable?'toggleKOPick('+ri+',\''+esc2(m.h.n)+'\')':'')+'">' +
      hBadge+'<span class="mflag-c">'+m.h.f+'</span><span class="mname-c">'+esc(m.h.n)+'</span><span class="mprob-c">'+hpDisplay+'%</span>' +

// ── MONTE CARLO POOL SIMULATION ──
// Simulates the remainder of the bracket many times to estimate:
//  - probability each individual entry survives to the end (all its picks win)
//  - probability AT LEAST ONE entry survives (the pool "cashes")
// Correctly handles correlation: shared picks win/lose together, and two teams
// in the same match can't both advance.
function simulatePool(numSims) {
  numSims = numSims || 20000;

  // An entry "survives" if every team it picked wins every match that team plays
  // in the round the entry used them (i.e. the picked team must win its match in
  // that specific round). Already-eliminated entries never survive.
  // We simulate each undecided match forward using its hp/ap, propagating winners.

  // Pre-build a static view of the bracket: for each round, the list of matches with
  // the two team slots and home win prob. We deep-copy per sim and fill winners.
  // Because later-round matchups depend on earlier winners, we simulate round by round
  // using BRACKET_FEED to carry winners forward.

  var survivorCounts = new Array(entries.length).fill(0);
  var atLeastOneCount = 0;
  var allSurviveCount = 0;

  // Precompute each entry's picks as {round: [teamNames]}
  var entryPicks = entries.map(function(e) {
    return (e.koPicks||[]).map(function(pick, ri) {
      return ri === 0 ? (pick||[]).slice() : (pick ? [pick] : []);
    });
  });
  var entryAlive = entries.map(function(e){ return e.alive; });

  for (var s = 0; s < numSims; s++) {
    // Build a mutable copy of match team slots + results for this sim
    var simRounds = koRounds.map(function(rd) {
      return rd.matches.map(function(m) {
        return { h:m.h.n, a:m.a.n, hp:m.hp, result:m.result || null };
      });
    });

    // Simulate round by round, resolving undecided matches and propagating winners
    for (var ri = 0; ri < simRounds.length; ri++) {
      for (var mi = 0; mi < simRounds[ri].length; mi++) {
        var sm = simRounds[ri][mi];
        var winner;
        if (sm.result) {
          winner = sm.result;
        } else if (sm.h === 'TBD' || sm.a === 'TBD') {
          continue; // can't resolve yet (shouldn't happen if propagation is correct)
        } else {
          winner = (Math.random() * 100 < sm.hp) ? sm.h : sm.a;
          sm.result = winner;
        }
        // propagate winner into next round slot
        var feed = BRACKET_FEED[ri + '-' + mi];
        if (feed && winner) {
          var nextM = simRounds[feed.ri][feed.mi];
          if (feed.slot === 'h') nextM.h = winner; else nextM.a = winner;
          // recompute hp for the next match from real odds if both known
          if (nextM.h !== 'TBD' && nextM.a !== 'TBD') {
            nextM.hp = getMatchupWinPct(nextM.h, nextM.a);
          }
        }
      }
    }

    // Now evaluate each entry: did every picked team win its match in the round used?
    var anySurvived = false;
    var allSurvived = true;
    for (var ei = 0; ei < entries.length; ei++) {
      var survived = entryAlive[ei];
      if (survived) {
        outer:
        for (var ri2 = 0; ri2 < entryPicks[ei].length; ri2++) {
          var picks = entryPicks[ei][ri2];
          for (var pi = 0; pi < picks.length; pi++) {
            var team = picks[pi];
            // find that team's match in round ri2 and check they won
            var found = false, won = false;
            for (var mi2 = 0; mi2 < simRounds[ri2].length; mi2++) {
              var mm = simRounds[ri2][mi2];
              if (mm.h === team || mm.a === team) {
                found = true;
                won = (mm.result === team);
                break;
              }
            }
            // If the picked team never reaches this round's match (already eliminated
            // earlier, e.g. lost their Semifinal so isn't in the Final), that's a fail too —
            // not just "found and lost". A pick only succeeds if the team is confirmed IN
            // that round's match AND wins it.
            if (!found || !won) { survived = false; break outer; }
          }
        }
      }
      if (survived) { survivorCounts[ei]++; anySurvived = true; }
      else { allSurvived = false; }
    }
    if (anySurvived) atLeastOneCount++;
    if (allSurvived && entries.length > 0) allSurviveCount++;
  }

  return {
    numSims: numSims,
    perEntry: survivorCounts.map(function(c){ return c / numSims; }),
    atLeastOne: atLeastOneCount / numSims,
    allSurvive: allSurviveCount / numSims,
  };
}
