// Checks if a team is still alive (hasn't lost a decided match anywhere in the bracket).
function teamAliveInBracket(name) {
  var eliminated = false;
  koRounds.forEach(function(rd) {
    rd.matches.forEach(function(m) {
      if (m.result && (m.h.n===name||m.a.n===name) && m.result!==name) eliminated = true;
    });
  });
  return !eliminated;
}

// Enumerates every valid remaining pick combination for an entry, reusing the exact
// same bracket-aware logic (getProjectedMatch / getPossibleTeamsForSlot) that powers
// the round pages themselves -- so a combo is only generated if it's actually reachable
// given the real bracket structure and this entry's own already-used teams. Capped at
// 2 remaining rounds ahead to keep the combinatorics manageable.
function enumerateEntryCombos(entry) {
  var remainingRounds = [];
  for (var ri = 1; ri <= 4; ri++) {
    var picked = !!(entry.koPicks||[])[ri];
    if (picked) continue; // entry already has a personal pick locked in for this round
    // A round only needs a NEW combo choice if it isn't already fully decided in the
    // real world -- otherwise there's nothing left to enumerate for it (the outcome
    // is known, and if the entry never made a pick there, that's simply a round they
    // chose to skip, not an open decision point).
    var allDecided = koRounds[ri].matches.every(function(m){ return !!m.result; });
    if (allDecided) continue;
    remainingRounds.push(ri);
  }
  if (remainingRounds.length === 0 || remainingRounds.length > 2) {
    return { combos: [], capped: remainingRounds.length > 2, remainingRounds: remainingRounds };
  }

  var results = [];
  function recurse(idx, hypoEntry, chain) {
    if (idx >= remainingRounds.length) {
      results.push(chain.slice());
      return;
    }
    var ri = remainingRounds[idx];
    var used = getUsed(hypoEntry);
    var optionsSet = {};
    koRounds[ri].matches.forEach(function(m, mi) {
      ['h','a'].forEach(function(slot) {
        var proj = getProjectedMatch(ri, mi, hypoEntry);
        var team = slot==='h' ? proj.h : proj.a;
        if (team.n === 'TBD') {
          getPossibleTeamsForSlot(ri, mi, slot).forEach(function(t) {
            if (t.n !== 'TBD') optionsSet[t.n] = true;
          });
        } else {
          optionsSet[team.n] = true;
        }
      });
    });
    Object.keys(optionsSet).forEach(function(teamName) {
      if (used.has(teamName)) return;
      if (!teamAliveInBracket(teamName)) return;
      var newEntry = JSON.parse(JSON.stringify(hypoEntry));
      newEntry.koPicks[ri] = teamName;
      recurse(idx+1, newEntry, chain.concat([{ri:ri, team:teamName}]));
    });
  }

  recurse(0, JSON.parse(JSON.stringify(entry)), []);
  return { combos: results, capped: false, remainingRounds: remainingRounds };
}

function renderCombos() {
  if (entries.length === 0) {
    return '<div class="main-inner"><div class="welcome"><div class="welcome-icon">🔀</div><div class="welcome-title">No entries yet</div><div class="welcome-sub">Add entries to see their remaining combinations</div></div></div>';
  }

  // Build one big batch of hypothetical entries (real alive entries x their valid combos)
  // and simulate them ALL together in a single pass, so every percentage shown is
  // computed consistently against the same random draws.
  var batchEntries = [];
  var batchMeta = []; // {realEntryIndex, comboIndex}
  var perEntryData = [];

  entries.forEach(function(e, ei) {
    if (!e.alive) {
      perEntryData.push({ entry:e, combos:[], capped:false, remainingRounds:[], eliminated:true });
      return;
    }
    var result = enumerateEntryCombos(e);
    var comboEntries = result.combos.map(function(chain) {
      var hypo = JSON.parse(JSON.stringify(e));
      chain.forEach(function(c){ hypo.koPicks[c.ri] = c.team; });
      return hypo;
    });
    comboEntries.forEach(function(hypo, ci) {
      batchMeta.push({ realEntryIndex:ei, comboIndex:ci });
      batchEntries.push(hypo);
    });
    perEntryData.push({ entry:e, combos:result.combos, capped:result.capped, remainingRounds:result.remainingRounds, eliminated:false });
  });

  var survPcts = [];
  if (batchEntries.length > 0) {
    var savedEntries = entries;
    entries = batchEntries;
    var sim = simulatePool(Math.max(8000, Math.round(120000 / batchEntries.length)));
    entries = savedEntries;
    survPcts = sim.perEntry.map(function(p){ return p*100; });
  }

  // Attach survival % back onto each entry's combo list
  var survIdx = 0;
  perEntryData.forEach(function(pd) {
    if (pd.eliminated) return;
    pd.combos = pd.combos.map(function(chain) {
      return { chain:chain, survPct: survPcts[survIdx++] };
    });

    // Group combos by everything EXCEPT their final pick. When multiple combos share
    // the same earlier picks and only differ in the LAST round, that final choice
    // doesn't need to be locked in now -- the entry can simply wait and pick whichever
    // team actually shows up once the earlier rounds resolve. In that case the true
    // achievable probability is the SUM across those branches (mutually exclusive,
    // exactly one will actually happen), not any single pre-committed guess.
    var groups = {};
    pd.combos.forEach(function(c) {
      var prefix = c.chain.slice(0, -1);
      var key = JSON.stringify(prefix.map(function(p){return p.team;}));
      if (!groups[key]) groups[key] = { prefix:prefix, options:[] };
      groups[key].options.push({ team: c.chain[c.chain.length-1].team, ri: c.chain[c.chain.length-1].ri, survPct: c.survPct });
    });

    pd.groupedCombos = Object.keys(groups).map(function(key) {
      var g = groups[key];
      var totalPct = g.options.reduce(function(sum,o){ return sum + o.survPct; }, 0);
      return { prefix:g.prefix, options:g.options, totalPct:totalPct, adaptive: g.options.length > 1 };
    });
    pd.groupedCombos.sort(function(a,b){ return b.totalPct - a.totalPct; });
  });

  var h = '<div class="main-inner">';
  h += '<h2 style="font-family:Barlow Condensed,sans-serif;font-size:22px;font-weight:700;margin-bottom:6px">All Remaining Combinations</h2>';
  h += '<p style="font-size:13px;color:var(--muted);margin-bottom:18px">Every valid pick combination left for each entry, given teams already used and the real bracket structure. Odds are computed together in one shared simulation so they\'re directly comparable across entries. When a later round has more than one live option stemming from the same earlier pick, you don\'t need to guess now -- the percentage shown already assumes you\'ll correctly pick whichever team actually advances once that round is decided.</p>';

  perEntryData.forEach(function(pd) {
    var e = pd.entry;
    h += '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:14px">';
    h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:'+(pd.eliminated?'#8a8a8a':'var(--green)')+';color:#fff">';
    h += '<span style="font-family:Barlow Condensed,sans-serif;font-size:16px;font-weight:700">'+esc(e.name)+'</span>';
    h += '<span style="font-size:11px;opacity:.85">'+(pd.eliminated?'Eliminated':(pd.remainingRounds.length===0?'All picks locked':pd.remainingRounds.map(function(ri){return KO_NAMES[ri];}).join(' + ')+' remaining'))+'</span>';
    h += '</div>';

    if (pd.eliminated) {
      h += '<div style="padding:12px 16px;font-size:12px;color:var(--hint)">This entry has already been eliminated.</div>';
    } else if (pd.remainingRounds.length === 0) {
      h += '<div style="padding:12px 16px;font-size:12px;color:var(--hint)">All future-round picks are already locked in for this entry.</div>';
    } else if (pd.capped) {
      h += '<div style="padding:12px 16px;font-size:12px;color:var(--gold)">This entry has '+pd.remainingRounds.length+' rounds still unpicked -- too many combinations to list here. Use the 🎯 Path Planner to see eligible teams round by round instead.</div>';
    } else if (pd.combos.length === 0) {
      h += '<div style="padding:12px 16px;font-size:12px;color:var(--red)">No valid combinations remain for this entry -- every path forward has already been blocked by used or eliminated teams.</div>';
    } else {
      h += '<div style="padding:10px 16px">';
      h += '<table style="width:100%;border-collapse:collapse;font-size:13px">';
      h += '<thead><tr>';
      h += '<th style="text-align:left;padding:4px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--hint)">Pick now</th>';
      h += '<th style="text-align:left;padding:4px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--hint)">Decide later</th>';
      h += '<th style="text-align:right;padding:4px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--hint)">Survival</th>';
      h += '</tr></thead><tbody>';
      pd.groupedCombos.forEach(function(g, gi) {
        var isBest = gi === 0;
        h += '<tr style="'+(isBest?'background:var(--green-l)':'')+';cursor:pointer" onclick="selectEntry('+entries.indexOf(e)+');go(\''+(g.prefix.length?KO_NAMES[g.prefix[0].ri]:KO_NAMES[g.options[0].ri])+'\')">';
        // "Pick now" column -- the earlier rounds this entry needs to decide immediately
        h += '<td style="padding:5px 8px">';
        if (g.prefix.length === 0) {
          h += '<span style="font-size:11px;color:var(--hint);font-style:italic">nothing yet</span>';
        } else {
          g.prefix.forEach(function(pick) {
            var q = getQuadrant(pick.team);
            var qColor = q ? QUAD_COLORS[q] : '#999';
            h += '<span style="display:inline-flex;align-items:center;gap:4px;background:'+qColor+'1A;border:1px solid '+qColor+';border-radius:12px;padding:2px 8px;font-size:12px;font-weight:600;color:'+qColor+';margin-right:4px">' +
              getTeamFlag(pick.team) + ' ' + esc(pick.team) + '</span>';
          });
        }
        h += '</td>';
        // "Decide later" column -- the final undecided pick, shown as options if adaptive
        h += '<td style="padding:5px 8px">';
        if (g.adaptive) {
          h += '<span style="font-size:11px;color:var(--muted)">whichever wins: </span>';
          g.options.forEach(function(o, oi) {
            var q = getQuadrant(o.team);
            var qColor = q ? QUAD_COLORS[q] : '#999';
            h += '<span style="display:inline-flex;align-items:center;gap:3px;background:'+qColor+'1A;border:1px dashed '+qColor+';border-radius:12px;padding:2px 7px;font-size:11px;font-weight:600;color:'+qColor+';margin-right:3px">' +
              getTeamFlag(o.team) + ' ' + esc(o.team) + '</span>';
          });
        } else {
          var o = g.options[0];
          var q = getQuadrant(o.team);
          var qColor = q ? QUAD_COLORS[q] : '#999';
          h += '<span style="display:inline-flex;align-items:center;gap:4px;background:'+qColor+'1A;border:1px solid '+qColor+';border-radius:12px;padding:2px 8px;font-size:12px;font-weight:600;color:'+qColor+'">' +
            getTeamFlag(o.team) + ' ' + esc(o.team) + '</span>';
        }
        h += '</td>';
        var survCol = g.totalPct>=15?'var(--green)':g.totalPct>=8?'var(--gold)':'var(--red)';
        h += '<td style="text-align:right;padding:5px 8px;font-family:Barlow Condensed,sans-serif;font-size:16px;font-weight:700;color:'+survCol+'">'+g.totalPct.toFixed(2)+'%'+(isBest?' <span style="font-size:10px;background:var(--green);color:#fff;padding:1px 6px;border-radius:8px;font-weight:600">BEST</span>':'')+'</td>';
        h += '</tr>';
      });
      h += '</tbody></table>';
      h += '</div>';
    }
    h += '</div>';
  });

  h += '</div>';
  return h;
}

function renderPathPlanner() {
  if (selEntry === null) {
    return '<div class="main-inner"><div class="welcome"><div class="welcome-icon">🎯</div><div class="welcome-title">Select an entry</div><div class="welcome-sub">Choose an entry above to see its path to the Final</div></div></div>';
  }
  var e = entries[selEntry];
  var used = getUsed(e);

  // Helper: is a team still alive in the tournament (hasn't lost a decided match)?
  function teamAlive(name) {
    var eliminated = false;
    koRounds.forEach(function(rd) {
      rd.matches.forEach(function(m) {
        if (m.result && (m.h.n===name||m.a.n===name) && m.result!==name) eliminated = true;
      });
    });
    return !eliminated;
  }

  // Helper: find which round+match a team currently sits in (their next undecided match)
  function findCurrentMatch(name) {
    for (var ri=0; ri<koRounds.length; ri++) {
      var matches = koRounds[ri].matches;
      for (var mi=0; mi<matches.length; mi++) {
        var m = matches[mi];
        if ((m.h.n===name||m.a.n===name) && !m.result && m.h.n!=='TBD' && m.a.n!=='TBD') {
          return {ri:ri, mi:mi, m:m};
        }
      }
    }
    return null;
  }

  var h = '<div class="main-inner">';
  h += '<h2 style="font-family:Barlow Condensed,sans-serif;font-size:22px;font-weight:700;margin-bottom:6px">Path Planner — '+esc(e.name)+'</h2>';
  h += '<p style="font-size:13px;color:var(--muted);margin-bottom:18px">Since every pick locks that team out of future rounds, surviving to the Final is really a chain of non-repeating picks. This shows what you\'ve locked in and what\'s still open.</p>';

  if (!e.alive) {
    h += '<div style="background:var(--red-l);border:1px solid #f5c0bb;border-radius:var(--rl);padding:16px;margin-bottom:18px;color:var(--red);font-weight:600">This entry has already been eliminated.</div>';
  }

  // ── STEP 1: Show the locked-in chain so far ──
  h += '<div style="margin-bottom:24px">';
  h += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--hint);margin-bottom:10px">Your Locked-In Picks</div>';
  h += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
  var hasAnyPick = false;
  KO_NAMES.forEach(function(rname, ri) {
    var picksArr = ri===0 ? (e.koPicks[0]||[]) : ((e.koPicks||[])[ri] ? [(e.koPicks||[])[ri]] : []);
    picksArr.forEach(function(name) {
      hasAnyPick = true;
      var rd = koRounds[ri];
      var m = rd.matches.find(function(m){return m.h.n===name||m.a.n===name;});
      var status = 'pending';
      if (m && m.result) status = m.result===name ? 'won' : 'lost';
      var bg = status==='won' ? 'var(--green-l)' : status==='lost' ? 'var(--red-l)' : 'var(--blue-l)';
      var col = status==='won' ? 'var(--green)' : status==='lost' ? 'var(--red)' : 'var(--blue)';
      var border = status==='won' ? '#b5dbc5' : status==='lost' ? '#f5c0bb' : '#b5cff5';
      h += '<div style="background:'+bg+';border:1px solid '+border+';border-radius:var(--r);padding:8px 14px;text-align:center;min-width:100px">' +
        '<div style="font-size:9px;color:'+col+';font-weight:700;text-transform:uppercase;letter-spacing:.04em">'+rname+'</div>' +
        '<div style="font-size:13px;font-weight:600;color:'+col+';margin-top:2px">'+getTeamFlag(name)+' '+esc(name)+'</div>' +
        '<div style="font-size:10px;color:'+col+';margin-top:2px">'+(status==='won'?'✓ Advanced':status==='lost'?'✗ Eliminated':'⏳ Pending')+'</div>' +
        '</div>';
      if (ri < 4) h += '<span style="color:var(--hint);font-size:16px">→</span>';
    });
  });
  if (!hasAnyPick) h += '<span style="font-size:13px;color:var(--hint);font-style:italic">No picks made yet</span>';
  h += '</div></div>';

  // ── STEP 2: For each remaining round, show eligible teams ──
  h += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--hint);margin-bottom:10px">What\'s Still Open — Round By Round</div>';

  KO_NAMES.forEach(function(rname, ri) {
    var alreadyPicked = ri===0 ? (e.koPicks[0]||[]).length >= R32_PICKS : !!(e.koPicks||[])[ri];
    var rd = koRounds[ri];

    // Collect all teams appearing in this round's matches that are still alive and not used
    var eligible = [];
    rd.matches.forEach(function(m) {
      [m.h, m.a].forEach(function(t) {
        if (t.n === 'TBD') return;
        if (used.has(t.n)) return;
        if (!teamAlive(t.n)) return;
        if (eligible.indexOf(t.n) === -1) eligible.push(t.n);
      });
    });

    h += '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px">';
    h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
    h += '<span style="font-family:Barlow Condensed,sans-serif;font-size:16px;font-weight:700">'+rname+'</span>';
    if (alreadyPicked) {
      h += '<span style="font-size:11px;background:var(--green-l);color:var(--green);padding:2px 10px;border-radius:10px;font-weight:600">Pick locked</span>';
    } else {
      h += '<span style="font-size:11px;background:var(--gold-l);color:var(--gold);padding:2px 10px;border-radius:10px;font-weight:600">'+eligible.length+' option'+(eligible.length===1?'':'s')+' open</span>';
    }
    h += '</div>';

    if (eligible.length === 0 && !alreadyPicked) {
      h += '<div style="font-size:12px;color:var(--hint);font-style:italic">No eligible teams yet — waiting on earlier rounds to resolve, or all remaining teams already used.</div>';
    } else if (!alreadyPicked) {
      // Sort eligible teams by their win probability for THIS round's match (best pick first)
      var scored = eligible.map(function(name) {
        var cm = findCurrentMatch(name);
        var winPct = null, oppName = '';
        if (cm) {
          winPct = cm.m.h.n===name ? cm.m.hp : cm.m.ap;
          var opp = cm.m.h.n===name ? cm.m.a : cm.m.h;
          if (opp.n !== 'TBD') oppName = opp.n;
        }
        var info = TEAM_INFO[name] || {};
        return { name:name, winPct:winPct, oppName:oppName, champ:info.ch||0 };
      });
      scored.sort(function(a,b){ return (b.winPct||0)-(a.winPct||0); });

      h += '<div style="display:flex;flex-direction:column;gap:5px">';
      scored.forEach(function(s) {
        var name = s.name;
        var q = getQuadrant(name);
        var qColor = q ? QUAD_COLORS[q] : '#999';
        var winColor = s.winPct>=60 ? 'var(--green)' : s.winPct>=40 ? 'var(--gold)' : 'var(--red)';
        h += '<div style="display:flex;align-items:center;gap:10px;background:'+qColor+'0F;border:1px solid '+qColor+'44;border-left:4px solid '+qColor+';border-radius:var(--r);padding:8px 12px;cursor:pointer" onclick="selectEntry('+selEntry+');go(\''+rname+'\')" title="Click to go pick">' +
          '<span style="font-size:16px">'+getTeamFlag(name)+'</span>' +
          '<span style="font-size:13px;font-weight:700;color:'+qColor+';min-width:100px">'+esc(name)+'</span>' +
          (q?'<span style="font-size:9px;font-weight:700;background:'+qColor+';color:#fff;padding:1px 5px;border-radius:3px">'+q+'</span>':'') +
          (s.winPct!==null ? '<span style="font-size:12px;color:'+winColor+';font-weight:600;min-width:130px">'+s.winPct+'% to beat '+esc(s.oppName)+'</span>' : '<span style="font-size:12px;color:var(--hint)">opponent TBD</span>') +
          '<span style="font-size:11px;color:var(--muted);margin-left:auto">'+s.champ+'% to win it all</span>' +
          '</div>';
      });
      h += '</div>';
    }
    h += '</div>';
  });

  // ── STEP 3: Explicit "if X then Y" scenario helper for the earliest un-picked round ──
  var nextUnpickedRi = -1;
  for (var ri=0; ri<5; ri++) {
    var picked = ri===0 ? (e.koPicks[0]||[]).length >= R32_PICKS : !!(e.koPicks||[])[ri];
    if (!picked) { nextUnpickedRi = ri; break; }
  }

  if (nextUnpickedRi >= 0 && nextUnpickedRi > 0) {
    // Show what has to happen upstream for teams to even reach this round
    h += '<div style="margin-top:20px;background:var(--blue-l);border:1px solid #b5cff5;border-radius:var(--rl);padding:16px">';
    h += '<div style="font-size:13px;font-weight:700;color:var(--blue);margin-bottom:8px">💡 How to think about your next pick ('+KO_NAMES[nextUnpickedRi]+')</div>';
    h += '<div style="font-size:12px;color:var(--text);line-height:1.6">';
    h += 'Any team you haven\'t already used yet can be picked here <strong>only if they actually reach '+KO_NAMES[nextUnpickedRi]+'</strong>. ';
    h += 'Since you can\'t reuse a team, picking someone you\'ve already used elsewhere is not an option — ';
    h += 'so if your earlier pick (e.g. a team you used in an earlier round) is still alive and advances further, you\'ll need to pick from the ';
    h += '<em>other</em> surviving teams for this round, which usually means the opposing side of the bracket.';
    h += '</div></div>';
  }

  h += '</div>';
  return h;
}

function renderQuadrants() {
  if (entries.length === 0) {
    return '<div class="main-inner"><div class="welcome"><div class="welcome-icon">🧭</div><div class="welcome-title">No entries yet</div><div class="welcome-sub">Add entries to see quadrant breakdown</div></div></div>';
  }

  var QORDER = ['Q1','Q2','Q3','Q4'];

  function entryPicksByQuad(e) {
    var byQuad = { Q1:[], Q2:[], Q3:[], Q4:[], none:[] };
    (e.koPicks||[]).forEach(function(pick, ri) {
      var names = ri===0 ? (pick||[]) : (pick ? [pick] : []);
      names.forEach(function(name) {
        var q = getQuadrant(name);
        (byQuad[q||'none']).push({n:name, flag:getTeamFlag(name), round:KO_NAMES[ri]});
      });
    });
    return byQuad;
  }

  var h = '<div class="main-inner">';
  h += '<h2 style="font-family:Barlow Condensed,sans-serif;font-size:22px;font-weight:700;margin-bottom:6px">Bracket Quadrants</h2>';
  h += '<p style="font-size:13px;color:var(--muted);margin-bottom:16px">Which quarter of the bracket each pick comes from. Spreading picks across quadrants reduces the risk of one upset wiping out multiple selections.</p>';

  h += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px">';
  QORDER.forEach(function(q) {
    h += '<div style="display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 12px">' +
      '<span style="width:10px;height:10px;border-radius:50%;background:'+QUAD_COLORS[q]+';display:inline-block"></span>' +
      '<span style="font-size:12px;font-weight:600;color:var(--text)">'+QUAD_LABELS[q]+'</span>' +
      '</div>';
  });
  h += '</div>';

  h += '<div style="display:flex;flex-direction:column;gap:14px">';
  entries.forEach(function(e, ei) {
    var byQuad = entryPicksByQuad(e);
    var totalPicks = QORDER.reduce(function(sum,q){ return sum + byQuad[q].length; }, 0) + byQuad.none.length;
    var usedQuads = QORDER.filter(function(q){ return byQuad[q].length > 0; });
    var maxQuad = QORDER.reduce(function(best,q){ return byQuad[q].length > byQuad[best].length ? q : best; }, 'Q1');
    var concentrationWarning = totalPicks > 0 && byQuad[maxQuad].length / totalPicks > 0.5;

    h += '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden">';
    h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:'+(e.alive?'var(--green)':'#8a8a8a')+';color:#fff">';
    h += '<span style="font-family:Barlow Condensed,sans-serif;font-size:17px;font-weight:700">'+esc(e.name)+'</span>';
    h += '<div style="display:flex;align-items:center;gap:10px">';
    h += '<span style="font-size:12px;opacity:.85">'+usedQuads.length+'/4 quadrants used</span>';
    if (concentrationWarning) {
      h += '<span style="font-size:11px;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:10px;font-weight:600">⚠ Concentrated in '+QUAD_LABELS[maxQuad]+'</span>';
    }
    h += '</div></div>';

    h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:0">';
    QORDER.forEach(function(q, qi) {
      var picks = byQuad[q];
      h += '<div style="padding:12px 16px;'+(qi<3?'border-right:1px solid var(--border);':'')+'border-top:3px solid '+QUAD_COLORS[q]+'">';
      h += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:'+QUAD_COLORS[q]+';margin-bottom:6px">'+QUAD_LABELS[q]+'</div>';
      if (picks.length === 0) {
        h += '<div style="font-size:12px;color:var(--hint);font-style:italic">No picks</div>';
      } else {
        picks.forEach(function(p) {
          h += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;cursor:pointer" onclick="selectEntry('+ei+');go(\''+p.round+'\')">';
          h += '<span style="font-size:13px">'+p.flag+'</span>';
          h += '<span style="font-size:12px;font-weight:500;flex:1">'+esc(p.n)+'</span>';
          h += '<span style="font-size:9px;color:var(--hint);background:var(--bg);padding:1px 5px;border-radius:3px">'+p.round+'</span>';
          h += '</div>';
        });
      }
      h += '</div>';
    });
    h += '</div>';

    if (byQuad.none.length > 0) {
      h += '<div style="padding:8px 16px;background:#fafaf8;border-top:1px solid var(--border);font-size:11px;color:var(--hint)">';
      h += 'Unmapped picks: ' + byQuad.none.map(function(p){return esc(p.n);}).join(', ');
      h += '</div>';
    }

    h += '</div>';
  });
  h += '</div>';

  h += '</div>';
  return h;
}

function renderMatrix() {
  var GRP = ['Q1','Q2','Q3','Q4'];
  var h = '<div class="main-inner">';
  h += '<div style="background:#1a1a1a;border-radius:var(--rl);padding:20px;color:#fff">';
  h += '<div class="mx-section-hdr" style="color:#fff">Quadrant Collision Overview</div>';
  h += '<div style="font-size:13px;color:#aaa;margin-bottom:16px">Teams in different quadrants cannot meet until the round shown. Same-quadrant teams collide earlier.</div>';
  h += '<table class="mx-tbl" style="width:100%"><thead><tr><th></th>';
  GRP.forEach(function(g){ h += '<th>'+g+'</th>'; });
  h += '</tr></thead><tbody>';
  var ROUNDS_BETWEEN = {
    'Q1-Q1':'R32-R16', 'Q2-Q2':'R32-R16', 'Q3-Q3':'R32-R16', 'Q4-Q4':'R32-R16',
    'Q1-Q2':'QF', 'Q3-Q4':'QF',
    'Q1-Q3':'SF', 'Q1-Q4':'SF', 'Q2-Q3':'SF', 'Q2-Q4':'Final-side',
  };
  // Actually Q1&Q2 meet at SF (top half), Q3&Q4 meet at SF (bottom half), winners meet at Final
  var REAL = {
    'Q1-Q1':'R16','Q2-Q2':'R16','Q3-Q3':'R16','Q4-Q4':'R16',
    'Q1-Q2':'SF','Q3-Q4':'SF',
    'Q1-Q3':'Final','Q1-Q4':'Final','Q2-Q3':'Final','Q2-Q4':'Final',
  };
  GRP.forEach(function(rowG) {
    h += '<tr><th>'+rowG+'</th>';
    GRP.forEach(function(colG) {
      var key = rowG < colG ? rowG+'-'+colG : colG+'-'+rowG;
      var val = rowG===colG ? 'QF' : (REAL[key] || '—');
      var bg = rowG===colG ? '#d4a017' : (val==='SF' ? '#8db84a' : val==='Final' ? '#2a7a4a' : '#555');
      h += '<td style="background:'+bg+'"><span style="font-size:11px;font-weight:700;color:#fff">'+val+'</span></td>';
    });
    h += '</tr>';
  });
  h += '</tbody></table>';
  h += '<div style="margin-top:14px;font-size:12px;color:#aaa">Within a quadrant (diagonal), teams can meet as early as the Quarterfinals once 4 R32 winners remain. Across quadrants in the same half (Q1↔Q2, Q3↔Q4) the earliest meeting is the Semifinal. Opposite-half quadrants (Q1/Q2 vs Q3/Q4) can only meet in the Final.</div>';
  h += '</div></div>';
  return h;
}

function renderProbs() {
  var h = '<div class="main-inner">';
  h += '<div style="margin-bottom:14px"><h2 style="font-family:Barlow Condensed,sans-serif;font-size:22px;font-weight:700">Edit Probabilities</h2>' +
    '<p style="font-size:13px;color:var(--muted);margin-top:4px">Adjust match win % per round — updates survival calculations instantly</p></div>';
  koRounds.forEach(function(rd, ri) {
    h += '<div class="kps"><h3>'+rd.name+'</h3>';
    rd.matches.forEach(function(m, mi) {
      h += '<div class="kpr">' +
        '<span class="kpn">'+m.h.f+' '+esc(m.h.n)+'</span>' +
        '<input class="kpi" type="number" min="0" max="100" step="1" value="'+m.hp+'" onchange="koRounds['+ri+'].matches['+mi+'].hp=parseInt(this.value)||0;koRounds['+ri+'].matches['+mi+'].ap=100-(parseInt(this.value)||0);saveData();renderSbar()"/>' +
        '<span class="kvs">% vs %</span>' +
        '<input class="kpi" type="number" min="0" max="100" step="1" value="'+m.ap+'" onchange="koRounds['+ri+'].matches['+mi+'].ap=parseInt(this.value)||0;koRounds['+ri+'].matches['+mi+'].hp=100-(parseInt(this.value)||0);saveData();renderSbar()"/>' +
        '<span class="kpn" style="text-align:right">'+esc(m.a.n)+' '+m.a.f+'</span>' +
        '<select class="prs" onchange="setMatchResult('+ri+','+mi+',this.value)">' +
        '<option value="">Pending</option>' +
        '<option value="'+esc2(m.h.n)+'"'+(m.result===m.h.n?' selected':'')+'>'+esc(m.h.n)+'</option>' +
        '<option value="'+esc2(m.a.n)+'"'+(m.result===m.a.n?' selected':'')+'>'+esc(m.a.n)+'</option>' +
        '</select></div>';
    });
    h += '</div>';
  });
  h += '</div>';
  return h;
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function esc2(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// Re-validate all entries against any match results baked into the static KO_DEF
// (e.g. matches already decided before the app loaded). Marks entries eliminated
// if they picked a team that lost a decided match.
function propagateBracket() {
  // Walk every round in order, pushing winners into next-round slots
  koRounds.forEach(function(rd, ri) {
    rd.matches.forEach(function(m, mi) {
      if (!m.result) return;
      var feedKey = ri + '-' + mi;
      var feed = BRACKET_FEED[feedKey];
      if (!feed) return;
      var nextM = koRounds[feed.ri].matches[feed.mi];
      var winnerTeam = m.result === m.h.n ? m.h : m.a;
      if (feed.slot === 'h') nextM.h = { f: winnerTeam.f, n: winnerTeam.n };
      else nextM.a = { f: winnerTeam.f, n: winnerTeam.n };
      // Update probabilities using real head-to-head odds
      if (nextM.h.n !== 'TBD' && nextM.a.n !== 'TBD') {
        nextM.hp = getMatchupWinPct(nextM.h.n, nextM.a.n);
        nextM.ap = 100 - nextM.hp;
      }
    });
  });
}

function revalidateEntries() {
  entries.forEach(function(e) {
    koRounds.forEach(function(rd, ri) {
      rd.matches.forEach(function(m) {
        if (!m.result) return;
        var picksArr = ri === 0 ? (e.koPicks[0]||[]) : ((e.koPicks||[])[ri] ? [(e.koPicks||[])[ri]] : []);
        picksArr.forEach(function(pick) {
          if ((m.h.n===pick||m.a.n===pick) && pick!==m.result) e.alive = false;
        });
      });
    });
  });
}

// ── INIT ──
loadData();
propagateBracket();
revalidateEntries();
try { render(); } catch(e) {
  console.error('Render error:', e);
  entries = []; selEntry = null; stage = 'overview';
  try { localStorage.removeItem('wc26_r32_v1'); } catch(e2){}
  render();
}
</script>
